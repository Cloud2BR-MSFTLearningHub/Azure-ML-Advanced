site_name: "Azure Machine Learning: Advanced"
site_description: Azure Machine Learning training from fundamentals to advanced MLOps.
site_url: https://cloud2br-msftlearninghub.github.io/Azure-ML-Advanced/
copyright: Copyright &copy; 2026 <a href="https://github.com/Cloud2BR-MSFTLearningHub" target="_blank" rel="noopener">Cloud2BR MSFT Learning Hub</a>

theme:
  name: material
  language: en
  logo: assets/img/org-logo.png
  favicon: assets/img/org-logo.png
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - content.code.copy
  palette:
    scheme: default
    primary: blue
    accent: blue

plugins:
  - search
  - mermaid2

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid
  - pymdownx.tabbed:
      alternate_style: true

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
  - assets/js/org-link.js

extra_css:
  - assets/css/custom.css

extra:
  generator: false
  alternate:
    - name: English
      link: /Azure-ML-Advanced/
      lang: en
    - name: Español
      link: /Azure-ML-Advanced/es/
      lang: es

nav:
  - Home: index.md
  - Introduction and Lifecycle: modules/introduction.md
  - ML Foundations: modules/ml-foundations.md
  - Azure ML Environment: modules/azure-ml-environment.md
  - Environment Setup: modules/environment-setup.md
  - Data Preparation: modules/data-preparation.md
  - Model Types: modules/model-types.md
  - Training and AutoML: modules/training-automl.md
  - Performance Metrics: modules/performance-metrics.md
  - Results and Explainability: modules/results-explainability.md
  - Deployment: modules/deployment.md
  - Deployment Debugging: modules/deployment-debug-k8s.md
  - Reference:
      - Overview: reference/index.md
      - Mathematical Model Deep Dive: reference/model-math-deep-dive.md
      - CLI Commands: reference/cli-commands.md
      - Glossary: reference/glossary.md
