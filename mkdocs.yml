site_name: "Azure Machine Learning: Basics to Advanced"
site_description: Azure Machine Learning training from fundamentals to advanced MLOps.
site_url: https://cloud2br-msftlearninghub.github.io/Azure-ML-Advanced/
repo_url: https://github.com/Cloud2BR-MSFTLearningHub/Azure-ML-Advanced
repo_name: Cloud2BR-MSFTLearningHub/Azure-ML-Advanced

theme:
  name: material
  language: en
  logo: assets/img/org-logo.png
  favicon: assets/img/org-logo.png
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - content.code.copy
  palette:
    scheme: default
    primary: blue
    accent: blue

plugins:
  - search
  - mermaid2

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

extra_css:
  - assets/css/custom.css

nav:
  - Home: index.md
  - Introduction and Lifecycle: modules/00-introduction.md
  - ML Foundations: modules/01-ml-foundations.md
  - Azure ML Environment: modules/02-azure-ml-environment.md
  - Environment Setup: modules/03-environment-setup.md
  - Data Preparation: modules/04-data-preparation.md
  - Model Types: modules/05-model-types.md
  - Training and AutoML: modules/06-training-automl.md
  - Performance Metrics: modules/07-performance-metrics.md
  - Results and Explainability: modules/08-results-explainability.md
  - Deployment: modules/09-deployment.md
  - Deployment Debugging: modules/10-deployment-debug-k8s.md
  - Reference:
      - Overview: reference/index.md
      - Mathematical Model Deep Dive: reference/model-math-deep-dive.md
      - CLI Commands: reference/cli-commands.md
      - Glossary: reference/glossary.md
