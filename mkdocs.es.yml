site_name: "Azure Machine Learning: Advanced"
site_description: Capacitación de Azure Machine Learning desde fundamentos hasta MLOps avanzado.
site_url: https://cloud2br-msftlearninghub.github.io/Azure-ML-Advanced/es/
copyright: Derechos de autor &copy; 2026 <a href="https://github.com/Cloud2BR-MSFTLearningHub" target="_blank" rel="noopener">Cloud2BR MSFT Learning Hub</a>

docs_dir: i18n-es
site_dir: site/es

theme:
  name: material
  language: es
  logo: assets/img/org-logo.png
  favicon: assets/img/org-logo.png
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - content.code.copy
  palette:
    scheme: default
    primary: blue
    accent: blue

plugins:
  - search
  - mermaid2

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid
  - pymdownx.tabbed:
      alternate_style: true

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
  - assets/js/org-link.js

extra_css:
  - assets/css/custom.css

extra:
  generator: false
  alternate:
    - name: English
      link: /Azure-ML-Advanced/
      lang: en
    - name: Español
      link: /Azure-ML-Advanced/es/
      lang: es

nav:
  - Inicio: index.md
  - 01. Prerrequisitos Matemáticos: modules/01-math-prerequisites.md
  - 02. Visión General de Extremo a Extremo: modules/02-e2e-overview.md
  - 03. Introducción y Ciclo de Vida: modules/03-introduction.md
  - 04. Fundamentos de ML: modules/04-ml-foundations.md
  - 05. Redes Neuronales y Deep Learning: modules/05-neural-networks.md
  - 06. Entorno de Azure ML: modules/06-azure-ml-environment.md
  - 07. Configuración del Entorno: modules/07-environment-setup.md
  - 08. Preparación de Datos: modules/08-data-preparation.md
  - 09. Tipos de Modelos: modules/09-model-types.md
  - 10. Entrenamiento y AutoML: modules/10-training-automl.md
  - 11. Métricas de Rendimiento: modules/11-performance-metrics.md
  - 12. Resultados y Explicabilidad: modules/12-results-explainability.md
  - 13. Despliegue: modules/13-deployment.md
  - 14. Depuración de Despliegue: modules/14-deployment-debug-k8s.md
  - Referencia:
      - Visión General: reference/index.md
      - Análisis Matemático Profundo de Modelos: reference/model-math-deep-dive.md
      - Comandos CLI: reference/cli-commands.md
      - Glosario: reference/glossary.md
