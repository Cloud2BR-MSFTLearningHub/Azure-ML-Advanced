site_name: "Azure Machine Learning: Advanced"
site_description: Capacitación de Azure Machine Learning desde fundamentos hasta MLOps avanzado.
site_url: https://cloud2br-msftlearninghub.github.io/Azure-ML-Advanced/es/
copyright: Derechos de autor &copy; 2026 <a href="https://github.com/Cloud2BR-MSFTLearningHub" target="_blank" rel="noopener">Cloud2BR MSFT Learning Hub</a>

docs_dir: i18n-es
site_dir: site/es

theme:
  name: material
  language: es
  logo: assets/img/org-logo.png
  favicon: assets/img/org-logo.png
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - content.code.copy
  palette:
    scheme: default
    primary: blue
    accent: blue

plugins:
  - search
  - mermaid2

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid
  - pymdownx.tabbed:
      alternate_style: true

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
  - assets/js/org-link.js

extra_css:
  - assets/css/custom.css

extra:
  generator: false
  alternate:
    - name: English
      link: /Azure-ML-Advanced/
      lang: en
    - name: Español
      link: /Azure-ML-Advanced/es/
      lang: es

nav:
  - Inicio: index.md
  - Introducción y Ciclo de Vida: modules/introduction.md
  - Fundamentos de ML: modules/ml-foundations.md
  - Entorno de Azure ML: modules/azure-ml-environment.md
  - Configuración del Entorno: modules/environment-setup.md
  - Preparación de Datos: modules/data-preparation.md
  - Tipos de Modelos: modules/model-types.md
  - Entrenamiento y AutoML: modules/training-automl.md
  - Métricas de Rendimiento: modules/performance-metrics.md
  - Resultados y Explicabilidad: modules/results-explainability.md
  - Despliegue: modules/deployment.md
  - Depuración de Despliegue: modules/deployment-debug-k8s.md
  - Referencia:
      - Visión General: reference/index.md
      - Análisis Matemático Profundo de Modelos: reference/model-math-deep-dive.md
      - Comandos CLI: reference/cli-commands.md
      - Glosario: reference/glossary.md
