<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="700" viewBox="0 0 1040 700" role="img" aria-labelledby="title desc">
  <title id="title">The End-to-End Machine Learning Workflow</title>
  <desc id="desc">A staged pipeline from problem framing through data preparation, model development, evaluation, deployment, and monitoring, with a feedback loop back to data.</desc>
  <defs>
    <style>
      .bg { fill: #f7fafc; }
      .title { fill: #0f172a; font-family: Segoe UI, Arial, sans-serif; font-size: 28px; font-weight: 700; }
      .subtitle { fill: #334155; font-family: Segoe UI, Arial, sans-serif; font-size: 15px; }
      .card { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; }
      .ch { fill: #ffffff; font-family: Segoe UI, Arial, sans-serif; font-size: 16px; font-weight: 700; }
      .bul { fill: #1f2937; font-family: Segoe UI, Arial, sans-serif; font-size: 13px; }
      .mref { font-family: Segoe UI, Arial, sans-serif; font-size: 12px; font-weight: 700; }
      .divider { stroke: #e2e8f0; stroke-width: 1; }
      .fnd { fill: #1e293b; font-family: Segoe UI, Arial, sans-serif; font-size: 14px; font-weight: 600; }
      .fbl { fill: #6d28d9; font-family: Segoe UI, Arial, sans-serif; font-size: 12px; font-weight: 700; }
      .arrow { stroke: #475569; stroke-width: 2.5; fill: none; }
      .fb { stroke: #6d28d9; stroke-width: 2.2; fill: none; stroke-dasharray: 6 5; }
    </style>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#475569"/>
    </marker>
    <marker id="ahp" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#6d28d9"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1040" height="700"/>
  <text class="title" x="44" y="48">The End-to-End Machine Learning Workflow</text>
  <text class="subtitle" x="44" y="76">How the pieces fit together, from framing a problem to monitoring a live model in production</text>

  <!-- ===== Row 1 ===== -->
  <!-- Card 1: Problem Framing -->
  <rect class="card" x="44" y="104" width="296" height="216" rx="12"/>
  <path d="M44,140 V116 a12,12 0 0 1 12,-12 H328 a12,12 0 0 1 12,12 V140 Z" fill="#004a99"/>
  <text class="ch" x="60" y="130">Problem Framing</text>
  <circle cx="62" cy="170" r="3" fill="#004a99"/><text class="bul" x="74" y="174">Decision to improve</text>
  <circle cx="62" cy="196" r="3" fill="#004a99"/><text class="bul" x="74" y="200">Unit and label</text>
  <circle cx="62" cy="222" r="3" fill="#004a99"/><text class="bul" x="74" y="226">Success KPI</text>
  <circle cx="62" cy="248" r="3" fill="#004a99"/><text class="bul" x="74" y="252">Cost of each error</text>
  <line class="divider" x1="60" y1="282" x2="324" y2="282"/>
  <text class="mref" x="60" y="304" fill="#004a99">Module 03</text>

  <!-- Card 2: Data Preparation -->
  <rect class="card" x="372" y="104" width="296" height="216" rx="12"/>
  <path d="M372,140 V116 a12,12 0 0 1 12,-12 H656 a12,12 0 0 1 12,12 V140 Z" fill="#0e7490"/>
  <text class="ch" x="388" y="130">Data Preparation</text>
  <circle cx="390" cy="170" r="3" fill="#0e7490"/><text class="bul" x="402" y="174">Collect sources</text>
  <circle cx="390" cy="196" r="3" fill="#0e7490"/><text class="bul" x="402" y="200">Clean and encode</text>
  <circle cx="390" cy="222" r="3" fill="#0e7490"/><text class="bul" x="402" y="226">Identify datasets</text>
  <circle cx="390" cy="248" r="3" fill="#0e7490"/><text class="bul" x="402" y="252">Train / test split</text>
  <line class="divider" x1="388" y1="282" x2="652" y2="282"/>
  <text class="mref" x="388" y="304" fill="#0e7490">Module 08</text>

  <!-- Card 3: Model Development -->
  <rect class="card" x="700" y="104" width="296" height="216" rx="12"/>
  <path d="M700,140 V116 a12,12 0 0 1 12,-12 H984 a12,12 0 0 1 12,12 V140 Z" fill="#b45309"/>
  <text class="ch" x="716" y="130">Model Development</text>
  <circle cx="718" cy="170" r="3" fill="#b45309"/><text class="bul" x="730" y="174">Workspace and environment</text>
  <circle cx="718" cy="196" r="3" fill="#b45309"/><text class="bul" x="730" y="200">Choose model type</text>
  <circle cx="718" cy="222" r="3" fill="#b45309"/><text class="bul" x="730" y="226">AutoML setup</text>
  <circle cx="718" cy="248" r="3" fill="#b45309"/><text class="bul" x="730" y="252">Train and search</text>
  <line class="divider" x1="716" y1="282" x2="980" y2="282"/>
  <text class="mref" x="716" y="304" fill="#b45309">Modules 06, 07, 09, 10</text>

  <!-- ===== Row 2 ===== -->
  <!-- Card 4: Monitoring (col1) -->
  <rect class="card" x="44" y="394" width="296" height="216" rx="12"/>
  <path d="M44,430 V406 a12,12 0 0 1 12,-12 H328 a12,12 0 0 1 12,12 V430 Z" fill="#6d28d9"/>
  <text class="ch" x="60" y="420">Monitoring</text>
  <circle cx="62" cy="460" r="3" fill="#6d28d9"/><text class="bul" x="74" y="464">Track data and model drift</text>
  <circle cx="62" cy="486" r="3" fill="#6d28d9"/><text class="bul" x="74" y="490">Debug endpoints</text>
  <circle cx="62" cy="512" r="3" fill="#6d28d9"/><text class="bul" x="74" y="516">Trigger retraining</text>
  <line class="divider" x1="60" y1="572" x2="324" y2="572"/>
  <text class="mref" x="60" y="594" fill="#6d28d9">Module 14</text>

  <!-- Card 5: Deployment (col2) -->
  <rect class="card" x="372" y="394" width="296" height="216" rx="12"/>
  <path d="M372,430 V406 a12,12 0 0 1 12,-12 H656 a12,12 0 0 1 12,12 V430 Z" fill="#004a99"/>
  <text class="ch" x="388" y="420">Deployment</text>
  <circle cx="390" cy="460" r="3" fill="#004a99"/><text class="bul" x="402" y="464">Register the model</text>
  <circle cx="390" cy="486" r="3" fill="#004a99"/><text class="bul" x="402" y="490">Online or batch endpoint</text>
  <circle cx="390" cy="512" r="3" fill="#004a99"/><text class="bul" x="402" y="516">Kubernetes serving</text>
  <line class="divider" x1="388" y1="572" x2="652" y2="572"/>
  <text class="mref" x="388" y="594" fill="#004a99">Module 13</text>

  <!-- Card 6: Evaluation (col3) -->
  <rect class="card" x="700" y="394" width="296" height="216" rx="12"/>
  <path d="M700,430 V406 a12,12 0 0 1 12,-12 H984 a12,12 0 0 1 12,12 V430 Z" fill="#15803d"/>
  <text class="ch" x="716" y="420">Evaluation</text>
  <circle cx="718" cy="460" r="3" fill="#15803d"/><text class="bul" x="730" y="464">Compute metrics</text>
  <circle cx="718" cy="486" r="3" fill="#15803d"/><text class="bul" x="730" y="490">Analyze results</text>
  <circle cx="718" cy="512" r="3" fill="#15803d"/><text class="bul" x="730" y="516">Explainability</text>
  <line class="divider" x1="716" y1="572" x2="980" y2="572"/>
  <text class="mref" x="716" y="594" fill="#15803d">Modules 11, 12</text>

  <!-- ===== Flow arrows ===== -->
  <!-- Row1 left to right -->
  <path class="arrow" d="M340,212 L368,212" marker-end="url(#ah)"/>
  <path class="arrow" d="M668,212 L696,212" marker-end="url(#ah)"/>
  <!-- Down from Model Development to Evaluation -->
  <path class="arrow" d="M848,320 L848,390" marker-end="url(#ah)"/>
  <!-- Row2 right to left: Evaluation -> Deployment -> Monitoring -->
  <path class="arrow" d="M700,502 L672,502" marker-end="url(#ah)"/>
  <path class="arrow" d="M372,502 L344,502" marker-end="url(#ah)"/>
  <!-- Feedback loop: Monitoring back up to Data Preparation -->
  <path class="fb" d="M150,394 C150,360 520,360 520,324" marker-end="url(#ahp)"/>
  <rect x="262" y="346" width="172" height="22" rx="11" fill="#f3effd" stroke="#ddd6fe" stroke-width="1"/>
  <text class="fbl" x="348" y="361" text-anchor="middle">Monitor and retrain</text>

  <!-- ===== Foundations band ===== -->
  <rect x="44" y="636" width="952" height="46" rx="10" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1.5"/>
  <text class="fnd" x="520" y="665" text-anchor="middle">Foundations under every stage: Mathematics (Module 01) and Neural Networks and Deep Learning (Module 05)</text>
</svg>
