title: Azure ML Training Hub
description: Azure Machine Learning training from basics to advanced
remote_theme: just-the-docs/just-the-docs
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
color_scheme: dark
search_enabled: true
heading_anchors: true
mermaid:
  version: "10.9.1"
markdown: kramdown
kramdown:
  math_engine: null
  syntax_highlighter: rouge
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - .bundle
