<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="680" viewBox="0 0 1040 680" role="img" aria-labelledby="title desc">
  <title id="title">El flujo de trabajo de Machine Learning de extremo a extremo</title>
  <desc id="desc">Una canalización por etapas desde el planteamiento del problema hasta la preparación de datos, el desarrollo del modelo, la evaluación, el despliegue y el monitoreo, con un ciclo de retroalimentación hacia los datos.</desc>
  <defs>
    <style>
      .bg { fill: #f7fafc; }
      .title { fill: #0f172a; font-family: Segoe UI, Arial, sans-serif; font-size: 26px; font-weight: 700; }
      .subtitle { fill: #334155; font-family: Segoe UI, Arial, sans-serif; font-size: 15px; }
      .card { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; }
      .ch { fill: #ffffff; font-family: Segoe UI, Arial, sans-serif; font-size: 16px; font-weight: 700; }
      .mp { fill: #ffffff; font-family: Segoe UI, Arial, sans-serif; font-size: 11px; font-weight: 700; opacity: 0.92; }
      .bul { fill: #1f2937; font-family: Segoe UI, Arial, sans-serif; font-size: 13px; }
      .fnd { fill: #1e293b; font-family: Segoe UI, Arial, sans-serif; font-size: 14px; font-weight: 600; }
      .fbl { fill: #6d28d9; font-family: Segoe UI, Arial, sans-serif; font-size: 12px; font-weight: 700; }
      .arrow { stroke: #475569; stroke-width: 2.5; fill: none; }
      .fb { stroke: #6d28d9; stroke-width: 2.2; fill: none; stroke-dasharray: 6 5; }
    </style>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#475569"/>
    </marker>
    <marker id="ahp" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#6d28d9"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1040" height="680"/>
  <text class="title" x="44" y="48">El flujo de trabajo de Machine Learning de extremo a extremo</text>
  <text class="subtitle" x="44" y="76">Cómo encajan las piezas, desde plantear el problema hasta monitorear un modelo en producción</text>

  <!-- ===== Fila 1 ===== -->
  <!-- Tarjeta 1: Planteamiento del Problema -->
  <rect class="card" x="44" y="104" width="296" height="206" rx="12"/>
  <path d="M44,140 V116 a12,12 0 0 1 12,-12 H328 a12,12 0 0 1 12,12 V140 Z" fill="#004a99"/>
  <text class="ch" x="60" y="130">Planteamiento</text>
  <text class="mp" x="324" y="130" text-anchor="end">Módulo 03</text>
  <circle cx="62" cy="166" r="3" fill="#004a99"/><text class="bul" x="74" y="170">Decisión a mejorar</text>
  <circle cx="62" cy="192" r="3" fill="#004a99"/><text class="bul" x="74" y="196">Unidad y etiqueta</text>
  <circle cx="62" cy="218" r="3" fill="#004a99"/><text class="bul" x="74" y="222">KPI de éxito</text>
  <circle cx="62" cy="244" r="3" fill="#004a99"/><text class="bul" x="74" y="248">Costo de cada error</text>

  <!-- Tarjeta 2: Preparación de Datos -->
  <rect class="card" x="372" y="104" width="296" height="206" rx="12"/>
  <path d="M372,140 V116 a12,12 0 0 1 12,-12 H656 a12,12 0 0 1 12,12 V140 Z" fill="#0e7490"/>
  <text class="ch" x="388" y="130">Preparación de Datos</text>
  <text class="mp" x="652" y="130" text-anchor="end">Módulo 08</text>
  <circle cx="390" cy="166" r="3" fill="#0e7490"/><text class="bul" x="402" y="170">Recolectar fuentes</text>
  <circle cx="390" cy="192" r="3" fill="#0e7490"/><text class="bul" x="402" y="196">Limpiar y codificar</text>
  <circle cx="390" cy="218" r="3" fill="#0e7490"/><text class="bul" x="402" y="222">Identificar conjuntos</text>
  <circle cx="390" cy="244" r="3" fill="#0e7490"/><text class="bul" x="402" y="248">División train / test</text>

  <!-- Tarjeta 3: Desarrollo del Modelo -->
  <rect class="card" x="700" y="104" width="296" height="206" rx="12"/>
  <path d="M700,140 V116 a12,12 0 0 1 12,-12 H984 a12,12 0 0 1 12,12 V140 Z" fill="#b45309"/>
  <text class="ch" x="716" y="130">Desarrollo del Modelo</text>
  <text class="mp" x="980" y="130" text-anchor="end">Módulos 06, 07, 09, 10</text>
  <circle cx="718" cy="166" r="3" fill="#b45309"/><text class="bul" x="730" y="170">Área de trabajo y entorno</text>
  <circle cx="718" cy="192" r="3" fill="#b45309"/><text class="bul" x="730" y="196">Elegir tipo de modelo</text>
  <circle cx="718" cy="218" r="3" fill="#b45309"/><text class="bul" x="730" y="222">Configurar AutoML</text>
  <circle cx="718" cy="244" r="3" fill="#b45309"/><text class="bul" x="730" y="248">Entrenar y buscar</text>

  <!-- ===== Fila 2 ===== -->
  <!-- Tarjeta 4: Monitoreo (col1) -->
  <rect class="card" x="44" y="380" width="296" height="206" rx="12"/>
  <path d="M44,416 V392 a12,12 0 0 1 12,-12 H328 a12,12 0 0 1 12,12 V416 Z" fill="#6d28d9"/>
  <text class="ch" x="60" y="406">Monitoreo</text>
  <text class="mp" x="324" y="406" text-anchor="end">Módulo 14</text>
  <circle cx="62" cy="442" r="3" fill="#6d28d9"/><text class="bul" x="74" y="446">Seguir la deriva</text>
  <circle cx="62" cy="468" r="3" fill="#6d28d9"/><text class="bul" x="74" y="472">Depurar endpoints</text>
  <circle cx="62" cy="494" r="3" fill="#6d28d9"/><text class="bul" x="74" y="498">Disparar reentrenamiento</text>

  <!-- Tarjeta 5: Despliegue (col2) -->
  <rect class="card" x="372" y="380" width="296" height="206" rx="12"/>
  <path d="M372,416 V392 a12,12 0 0 1 12,-12 H656 a12,12 0 0 1 12,12 V416 Z" fill="#004a99"/>
  <text class="ch" x="388" y="406">Despliegue</text>
  <text class="mp" x="652" y="406" text-anchor="end">Módulo 13</text>
  <circle cx="390" cy="442" r="3" fill="#004a99"/><text class="bul" x="402" y="446">Registrar el modelo</text>
  <circle cx="390" cy="468" r="3" fill="#004a99"/><text class="bul" x="402" y="472">Endpoint en línea o por lotes</text>
  <circle cx="390" cy="494" r="3" fill="#004a99"/><text class="bul" x="402" y="498">Servicio en Kubernetes</text>

  <!-- Tarjeta 6: Evaluación (col3) -->
  <rect class="card" x="700" y="380" width="296" height="206" rx="12"/>
  <path d="M700,416 V392 a12,12 0 0 1 12,-12 H984 a12,12 0 0 1 12,12 V416 Z" fill="#15803d"/>
  <text class="ch" x="716" y="406">Evaluación</text>
  <text class="mp" x="980" y="406" text-anchor="end">Módulos 11, 12</text>
  <circle cx="718" cy="442" r="3" fill="#15803d"/><text class="bul" x="730" y="446">Calcular métricas</text>
  <circle cx="718" cy="468" r="3" fill="#15803d"/><text class="bul" x="730" y="472">Analizar resultados</text>
  <circle cx="718" cy="494" r="3" fill="#15803d"/><text class="bul" x="730" y="498">Explicabilidad</text>

  <!-- ===== Flechas de flujo ===== -->
  <path class="arrow" d="M340,207 L368,207" marker-end="url(#ah)"/>
  <path class="arrow" d="M668,207 L696,207" marker-end="url(#ah)"/>
  <path class="arrow" d="M848,310 L848,376" marker-end="url(#ah)"/>
  <path class="arrow" d="M700,483 L672,483" marker-end="url(#ah)"/>
  <path class="arrow" d="M372,483 L344,483" marker-end="url(#ah)"/>
  <path class="fb" d="M192,380 C192,348 520,352 520,314" marker-end="url(#ahp)"/>
  <text class="fbl" x="356" y="346" text-anchor="middle">Monitorear y reentrenar</text>

  <!-- ===== Banda de fundamentos ===== -->
  <rect x="44" y="612" width="952" height="46" rx="10" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1.5"/>
  <text class="fnd" x="520" y="641" text-anchor="middle">Fundamentos en cada etapa: Matemáticas (Módulo 01) y Redes Neuronales y Deep Learning (Módulo 05)</text>
</svg>
