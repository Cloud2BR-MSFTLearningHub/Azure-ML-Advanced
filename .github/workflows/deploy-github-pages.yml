name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - "docs/**"
      - ".github/workflows/deploy-github-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  deployments: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./docs
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  cleanup-old-deployments:
    name: Cleanup Old github-pages Deployments
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Keep only latest deployment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          mapfile -t DEPLOYMENT_IDS < <(gh api \
            "repos/${REPO}/deployments" \
            -f environment=github-pages \
            -f per_page=100 \
            --jq 'sort_by(.created_at) | reverse | .[].id')

          if [ "${#DEPLOYMENT_IDS[@]}" -le 1 ]; then
            echo "Nothing to clean. Deployment count: ${#DEPLOYMENT_IDS[@]}"
            exit 0
          fi

          echo "Keeping latest deployment: ${DEPLOYMENT_IDS[0]}"

          for OLD_ID in "${DEPLOYMENT_IDS[@]:1}"; do
            echo "Cleaning deployment: ${OLD_ID}"
            gh api "repos/${REPO}/deployments/${OLD_ID}/statuses" -f state=inactive >/dev/null 2>&1 || true
            gh api -X DELETE "repos/${REPO}/deployments/${OLD_ID}" >/dev/null 2>&1 || true
          done
